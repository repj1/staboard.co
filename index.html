<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staboard.co | Rico Staboard</title>
    
    <link rel="icon" type="image/png" href="rsb3.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fafafa;
            --text-color: #111111;
            --secondary-text: #666666;
            --border-color: #eeeeee;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            display: flex;
            flex-row-reverse: row-reverse; /* Flips the positioning of logo and menu button */
            justify-content: space-between;
            align-items: center;
            padding: 2rem 5%;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 102; 
        }

        .logo {
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
            text-decoration: none;
            color: var(--text-color);
            text-transform: lowercase;
            transition: color 0.3s ease;
        }

        /* Hamburger Menu Icon - Locked on the Left */
        .hamburger {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 30px;
            height: 20px;
            cursor: pointer;
            z-index: 103; 
        }

        .hamburger span {
            display: block;
            height: 3px;
            width: 100%;
            background-color: var(--text-color);
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        /* Hamburger Transitions & State Inversion */
        .hamburger.active span {
            background-color: #ffffff;
        }
        .hamburger.active span:nth-child(1) {
            transform: translateY(8.5px) rotate(45deg);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: translateY(-8.5px) rotate(-45deg);
        }

        /* 1/3 Screen Left Side Panel Overlay */
        .rogwalk-menu {
            position: fixed;
            top: 0;
            left: -33.333%; /* Offscreen boundary anchor on left side */
            width: 33.333%;  /* Explicit 1/3 screen layout width */
            height: 100vh;
            background-color: #111111;
            z-index: 101;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start; /* Left-aligns container items */
            padding: 2rem 15% 2rem 5%; /* Generous left padding for text alignment */
            transition: left 0.4s cubic-bezier(0.77, 0, 0.175, 1);
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
        }

        .rogwalk-menu.active {
            left: 0; /* Smooth structural entrance from the left */
        }

        .rogwalk-links {
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* Left-aligns individual links */
            gap: 0.6rem;
        }

        .rogwalk-links a {
            text-decoration: none;
            color: #ffffff;
            font-size: 1.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -1px;
            opacity: 0.4;
            transition: opacity 0.2s ease, transform 0.2s ease, color 0.2s ease;
            cursor: pointer;
            text-align: left;
        }

        .rogwalk-links a:hover {
            opacity: 1;
            transform: translateX(5px); /* Changed to dynamic slight right-nudge on hover */
            color: #4ade80;
        }

        /* Hero Section */
        .hero {
            max-width: 1400px;
            margin: 0 auto;
            padding: 4rem 5% 6rem 5%;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .hero .badge {
            display: inline-block;
            background-color: rgba(226, 232, 240, 0.8);
            color: #334155;
            padding: 0.35rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 2rem;
            backdrop-filter: blur(4px);
        }

        .hero h1 {
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: -2.5px;
            line-height: 1.05;
            margin-bottom: 1.5rem;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero p {
            font-size: 1.3rem;
            color: var(--secondary-text);
            max-width: 600px;
            margin: 0 auto 3rem auto;
            font-weight: 300;
        }

        /* Dedicated Premium Rico Feature Portrait - Repaired */
        .rico-canvas {
            max-width: 600px;
            margin: 0 auto 4rem auto;
            background: #ffffff;
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid var(--border-color);
        }

        .rico-canvas img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
        }

        /* Features Section */
        .features-container {
            background-color: #ffffff;
            padding: 8rem 5%;
            border-top: 1px solid var(--border-color);
            position: relative;
            z-index: 10;
        }

        .features {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 4rem;
        }

        .feature-card {
            padding: 0.5rem;
        }

        .feature-card .emoji {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            display: block;
        }

        .feature-card h3 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 1rem;
            letter-spacing: -0.5px;
        }
