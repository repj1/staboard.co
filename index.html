<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staboard.co | Rico Staboard</title>
    
    <link rel="icon" type="image/png" href="rsb3.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fafafa;
            --text-color: #111111;
            --secondary-text: #666666;
            --border-color: #eeeeee;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: flex-start; /* Aligns contents to the left border natively */
            align-items: center;
            padding: 2rem 5%;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 102; 
        }

        /* Pushes the logo dynamically to the absolute right */
        .logo {
            margin-left: auto;
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
            text-decoration: none;
            color: var(--text-color);
            text-transform: lowercase;
            transition: color 0.3s ease;
        }

        .logo.menu-open {
            color: #ffffff;
        }

        /* Hamburger Menu Icon - Locked on the Left */
        .hamburger {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 30px;
            height: 20px;
            cursor: pointer;
            z-index: 103; 
        }

        .hamburger span {
            display: block;
            height: 3px;
            width: 100%;
            background-color: var(--text-color);
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        /* Hamburger Transitions & State Inversion */
        .hamburger.active span {
            background-color: #ffffff;
        }
        .hamburger.active span:nth-child(1) {
            transform: translateY(8.5px) rotate(45deg);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: translateY(-8.5px) rotate(-45deg);
        }

        /* 1/3 Screen Left Side Panel Overlay */
        .rogwalk-menu {
            position: fixed;
            top: 0;
            left: -33.333%; 
            width: 33.333%;  
            height: 100vh;
            background-color: #111111;
            z-index: 101;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start; 
            padding: 2rem 5% 2rem 5%; 
            transition: left 0.4s cubic-bezier(0.77, 0, 0.175, 1);
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
        }

        .rogwalk-menu.active {
            left: 0; 
        }

        .rogwalk-links {
            display: flex;
            flex-direction: column;
            align-items: flex-start; 
            gap: 0.6rem;
        }

        .rogwalk-links a {
            text-decoration: none;
            color: #ffffff;
            font-size: 1.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -1px;
            opacity: 0.4;
            transition: opacity 0.2s ease, transform 0.2s ease, color 0.2s ease;
            cursor: pointer;
