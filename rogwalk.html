<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Rogwalk Protocol | Staboard.co</title>
    
    <link rel="icon" type="image/png" href="rsb3.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #111111; 
            --text-color: #ffffff;
            --secondary-text: #888888;
            --accent-color: #4ade80;
            --border-color: #222222;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.4;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 5%;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* Updated Per Instructions */
        .back-btn {
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            color: var(--secondary-text);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.2s ease;
        }

        .back-btn:hover {
            color: var(--text-color);
        }

        .logo {
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
            text-decoration: none;
            color: var(--text-color);
            text-transform: lowercase;
        }

        .rogwalk-container {
            max-width: 800px;
            margin: 2rem auto 4rem auto;
            padding: 0 5%;
            text-align: center;
        }

        /* Incremental Typography Stack */
        .rogwalk-statement {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 4rem;
        }

        .line-1 { font-size: 1.1rem; font-weight: 300; opacity: 0.5; }
        .line-2 { font-size: 1.4rem; font-weight: 400; opacity: 0.7; }
        .line-3 { font-size: 1.8rem; font-weight: 600; opacity: 0.85; letter-spacing: -0.5px; }
        .line-4 { font-size: 2.3rem; font-weight: 700; opacity: 0.95; letter-spacing: -1px; }
        .line-5 { font-size: 2.8rem; font-weight: 800; letter-spacing: -1.5px; }
        .line-6 { font-size: 3.2rem; font-weight: 800; letter-spacing: -2px; }
